<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adversarial Review Arena — Rap Battle</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <!-- Header / Config Bar -->
      <header class="config-bar">
        <div class="config-group">
          <label>Target File</label>
          <div class="file-picker">
            <input type="text" id="target-file" placeholder="/path/to/file.ext" readonly />
            <button id="browse-btn" class="btn btn-small">Browse</button>
          </div>
        </div>

        <div class="config-group">
          <label>First Agent</label>
          <select id="first-agent">
            <option value="claude">Claude Code (goes first)</option>
            <option value="codex">Codex (goes first)</option>
          </select>
        </div>

        <div class="config-group">
          <label>Max Turns</label>
          <input type="number" id="max-turns" value="3" min="1" max="20" />
        </div>

        <div class="config-group">
          <button id="start-btn" class="btn btn-primary">🎤 Start Battle</button>
          <button id="cancel-btn" class="btn btn-danger" disabled>■ Cancel</button>
        </div>
      </header>

      <!-- Status bar -->
      <div class="status-bar" id="status-bar">
        <span class="status-idle">● Idle — Configure and start a review battle</span>
      </div>

      <!-- Main split view -->
      <main class="split-view">
        <!-- Left pane: Claude Code -->
        <section class="pane pane-left" id="pane-claude">
          <div class="pane-header">
            <span class="agent-badge claude-badge">🎤 Claude Code</span>
            <span class="turn-count" id="claude-turn-count">0 verses</span>
          </div>
          <div class="pane-body" id="claude-output">
            <div class="placeholder">Claude Code will drop verses here</div>
          </div>
        </section>

        <!-- Right pane: Codex -->
        <section class="pane pane-right" id="pane-codex">
          <div class="pane-header">
            <span class="agent-badge codex-badge">🎙 Codex</span>
            <span class="turn-count" id="codex-turn-count">0 verses</span>
          </div>
          <div class="pane-body" id="codex-output">
            <div class="placeholder">Codex will drop verses here</div>
          </div>
        </section>
      </main>

      <!-- Footer log -->
      <footer class="log-bar" id="log-bar">
        <div class="log-header">Battle Log</div>
        <div class="log-content" id="log-content"></div>
      </footer>
    </div>

    <script type="module" src="main.ts"></script>
  </body>
</html>
